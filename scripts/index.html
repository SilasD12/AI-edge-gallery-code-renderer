<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
</head>
<body>
  <script>
    window['ai_edge_gallery_get_result'] = async (dataStr) => {
      try {
        const input = JSON.parse(dataStr);
        const html = input.html;

        if (!html || typeof html !== 'string') {
          return JSON.stringify({ error: 'Code Renderer: no HTML provided in data.html' });
        }

        // Base64-encode the HTML into the hash of renderer.html.
        // This avoids both the cross-WebView localStorage problem and
        // the URI length limits of data: URLs.
        const encoded = btoa(unescape(encodeURIComponent(html)));
        const url = `renderer.html#${encoded}`;

        return JSON.stringify({
          result: 'Code rendered. Tap the preview to interact with it.',
          webview: {
            url: url,
            aspectRatio: 1.5
          }
        });

      } catch (e) {
        return JSON.stringify({ error: `Code Renderer error: ${e.message}` });
      }
    };
  </script>
</body>
</html>
