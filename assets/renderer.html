<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Renderer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 12px;
      height: 30px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      font-family: monospace;
      font-size: 11px;
      color: #888;
      user-select: none;
    }

    #toolbar .title {
      color: #ccc;
      letter-spacing: 0.03em;
    }

    #status {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: #2a2a2a;
      color: #888;
    }

    #status.running {
      background: #1a3a1a;
      color: #4caf50;
    }

    #status.error {
      background: #3a1a1a;
      color: #f44;
    }

    #render-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 30px);
      border: none;
      background: #fff;
    }

    #error-banner {
      display: none;
      padding: 24px 20px;
      color: #f88;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <span class="title">code-renderer</span>
    <span id="status">loading</span>
  </div>

  <div id="error-banner"></div>

  <!--
    sandbox="allow-scripts":
      - JS inside the iframe CAN execute
      - iframe CANNOT access parent DOM or localStorage
      - iframe CANNOT navigate the top-level window
      - "allow-same-origin" is intentionally omitted — adding it would give
        the sandboxed code full access to this page's localStorage
    referrerpolicy="no-referrer":
      - CDN requests from inside the iframe won't leak the app's origin
  -->
  <iframe
    id="render-frame"
    sandbox="allow-scripts"
    referrerpolicy="no-referrer"
  ></iframe>

  <script>
    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = cls || '';
    }

    function showError(msg) {
      setStatus('error', 'error');
      const banner = document.getElementById('error-banner');
      banner.style.display = 'block';
      banner.textContent = msg;
      document.getElementById('render-frame').style.display = 'none';
    }

    /**
     * Reverse of the URL-safe base64 encoding used in scripts/index.html.
     * Restores '+' and '/', re-pads with '=' so atob() accepts it, then
     * decodes UTF-8.
     */
    function decodePayload(encoded) {
      let b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
      const pad = b64.length % 4;
      if (pad) b64 += '='.repeat(4 - pad);
      return decodeURIComponent(escape(atob(b64)));
    }

    function init() {
      const encoded = window.location.hash.slice(1);

      if (!encoded) {
        showError(
          'No code found.\n\n' +
          'Ask the model to generate something — for example:\n' +
          '  "Build me a snake game"\n' +
          '  "Create a bouncing ball animation"\n' +
          '  "Make a calculator"'
        );
        return;
      }

      let html;
      try {
        html = decodePayload(encoded);
      } catch (e) {
        showError(`Failed to decode payload: ${e.message}`);
        return;
      }

      const frame = document.getElementById('render-frame');
      frame.srcdoc = html;
      setStatus('running', 'running');
    }

    init();
  </script>

</body>
</html>
